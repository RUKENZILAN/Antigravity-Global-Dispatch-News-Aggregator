<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Dispatch | Respected World News</title>
    <meta name="description" content="A curated daily news aggregator featuring top stories from respected international channels like BBC, CNN, El Mundo, NYT, and Al Jazeera.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <div class="header-container">
            <div class="logo">
                <h1>Global Dispatch</h1>
                <p>Curated International News</p>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" aria-label="Toggle Dark Mode">
                    <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                </button>
            </div>
        </div>
        
        <nav class="source-filters">
            <div class="filter-scroll-container">
                <button class="filter-btn active" data-source="all">All Sources</button>
                <button class="filter-btn" data-source="BBC News">BBC</button>
                <button class="filter-btn" data-source="CNN">CNN</button>
                <button class="filter-btn" data-source="El Mundo">El Mundo</button>
                <button class="filter-btn" data-source="NYT">NYT</button>
                <button class="filter-btn" data-source="Al Jazeera">Al Jazeera</button>
                <button class="filter-btn" data-source="DW">DW</button>
            </div>
        </nav>
    </header>

    <main class="content-wrapper">
        <div class="status-container" id="status-message">
            <div class="loader"></div>
            <p>Fetching the latest dispatches...</p>
        </div>
        
        <div class="news-grid" id="news-grid">
            <!-- News cards will be injected here by JS -->
        </div>
    </main>

    <footer class="app-footer">
        <p>&copy; <span id="current-year"></span> Global Dispatch. Content provided by respective RSS feeds.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
